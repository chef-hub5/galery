  <script>
    const defaultConfig = {
      gallery_title: "My Gallery",
      background_color: "#f5f5f4",
      text_color: "#292524"
    };

    async function onConfigChange(config) {
      document.getElementById('gallery-title').textContent = config.gallery_title || defaultConfig.gallery_title;
      document.getElementById('app').style.backgroundColor = config.background_color || defaultConfig.background_color;
      document.getElementById('gallery-title').style.color = config.text_color || defaultConfig.text_color;
    }

    function mapToCapabilities(config) {
      return {
        recolorables: [
          {
            get: () => config.background_color || defaultConfig.background_color,
            set: (value) => { config.background_color = value; window.elementSdk.setConfig({ background_color: value }); }
          },
          {
            get: () => config.text_color || defaultConfig.text_color,
            set: (value) => { config.text_color = value; window.elementSdk.setConfig({ text_color: value }); }
          }
        ],
        borderables: [],
        fontEditable: undefined,
        fontSizeable: undefined
      };
    }

    function mapToEditPanelValues(config) {
      return new Map([
        ["gallery_title", config.gallery_title || defaultConfig.gallery_title]
      ]);
    }

    if (window.elementSdk) {
      window.elementSdk.init({
        defaultConfig,
        onConfigChange,
        mapToCapabilities,
        mapToEditPanelValues
      });
    }
  </script>
